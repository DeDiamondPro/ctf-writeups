{{- define "main" }}
<div class="post-single">
  <div class="post-content">
    <h1>CTF Writeups</h1>
    <p>Welcome to the CTF writeups page! Here I post some of the challenges I have solved during CTF events.</p>
    <ul>
      {{- range .Site.Sections }}
      <li>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
        <span> — {{ len .Pages }} challenge(s)</span>
      </li>
      {{- end }}
    </ul>
  </div>
</div>
{{- end }}
